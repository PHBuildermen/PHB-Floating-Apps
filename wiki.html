<!DOCTYPE html>
<html>
<head>
  <title>Studio X Wiki</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <h2>Studio X Wiki</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

  <h1>Create Wiki Page</h1>

  <input id="title" placeholder="Page Title">

  <!-- Editor Toolbar -->
  <div class="card">
    <button onclick="boldText()">Bold</button>
    <button onclick="heading()">H2</button>
    <input type="file" onchange="insertImage(this)">
  </div>

  <!-- Editor -->
  <div id="editor" contenteditable="true" class="editor"></div>

  <button onclick="save()">Save Page</button>

  <hr>

  <h2>Pages</h2>
  <div id="pages"></div>

</div>

<script type="module">
import { createPage, loadPages } from "./wiki.js";
import { initEditor } from "./editor.js";
import { logout } from "./auth.js";

initEditor("editor");

window.save = async () => {
  const title = document.getElementById("title").value;
  const content = document.getElementById("editor").innerHTML;

  await createPage(title, content);
  alert("Saved!");
  location.reload();
};

loadPages((pages) => {
  const container = document.getElementById("pages");

  pages.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <h3>${p.title}</h3>
        <div>${p.content}</div>
        <small>by ${p.author}</small>
      </div>
    `;
  });
});
</script>

</body>
</html>
