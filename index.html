<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHB | Floating Apps</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Desktop -->
  <div id="desktop">

    <!-- Topbar -->
    <div class="topbar">
      PHB | Floating Apps
    </div>

    <!-- App Launcher -->
    <div class="launcher">
      <div class="app-card" data-app="google">🌐 Google</div>
      <div class="app-card" data-app="youtube">▶️ YouTube</div>
      <div class="app-card" data-app="calculator">🧮 Calculator</div>
    </div>

    <!-- Workspace -->
    <div id="workspace"></div>

    <!-- Taskbar -->
    <div id="taskbar"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
