<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PHB | Floating Apps</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Header -->
  <header class="topbar">
    <h1>PHB | Floating Apps</h1>
  </header>

  <!-- App Launcher -->
  <section class="launcher">
    <div class="app-card" data-app="google">
      🌐 <span>Google</span>
    </div>
    <div class="app-card" data-app="youtube">
      ▶️ <span>YouTube</span>
    </div>
    <div class="app-card" data-app="calculator">
      🧮 <span>Calculator</span>
    </div>
  </section>

  <!-- Workspace -->
  <main id="workspace"></main>

  <!-- Dock -->
  <div id="dock"></div>

  <script src="script.js"></script>
</body>
</html>
